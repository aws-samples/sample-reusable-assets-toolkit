[env]
_.file = ".env"

[tasks.rat]
description = "Run rat CLI"
run = "cargo run -p rat-cli --"

[tasks.build]
description = "Build all crates"
run = "cargo build --workspace"

[tasks.release]
description = "Build release binaries"
run = "cargo build --workspace --release"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.lint]
description = "Run clippy"
run = "cargo clippy --workspace -- -D warnings"

[tasks.fmt]
description = "Format code"
run = "cargo fmt --all"

[tasks.lambda-build]
description = "Build Lambda binary (AL2023 target)"
run = "cargo build -p rat-lambda --release --target aarch64-unknown-linux-gnu"

[tasks.publish-cli]
description = "Build rat CLI (aarch64-apple-darwin) and upload to GitLab Generic Package Registry"
run = '''
set -euo pipefail

TARGET=aarch64-apple-darwin
VERSION=$(cargo metadata --no-deps --format-version=1 \
  | jq -r '.packages[] | select(.name=="rat-cli") | .version')
if [ -z "${VERSION}" ]; then
  echo "failed to resolve rat-cli version from cargo metadata" >&2
  exit 1
fi
BINARY=target/${TARGET}/release/rat
ASSET_NAME=rat-${TARGET}
URL="https://gitlab.aws.dev/api/v4/projects/${GITLAB_PROJECT_ID}/packages/generic/rat-cli/${VERSION}/${ASSET_NAME}"

echo "Building rat-cli ${VERSION} for ${TARGET}..."
cargo build --release --bin rat --target "${TARGET}"

echo "Uploading to ${URL}"
curl --fail --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
  --upload-file "${BINARY}" \
  "${URL}"
echo
echo "Done."
'''
