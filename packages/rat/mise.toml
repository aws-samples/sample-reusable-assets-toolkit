[tasks.rat]
description = "Run rat CLI"
run = "cargo run -p rat-cli --"

[tasks.build]
description = "Build all crates"
run = "cargo build --workspace"

[tasks.release]
description = "Build release binaries"
run = "cargo build --workspace --release"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.lint]
description = "Run clippy"
run = "cargo clippy --workspace -- -D warnings"

[tasks.fmt]
description = "Format code"
run = "cargo fmt --all"

[tasks.lambda-build]
description = "Build Lambda binary (AL2023 target)"
run = "cargo build -p rat-lambda --release --target aarch64-unknown-linux-gnu"
